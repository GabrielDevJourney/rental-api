# H2 in-memory database for controller integration tests
# noinspection UnusedProperty,SpellCheckingInspection
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# noinspection UnusedProperty
spring.datasource.driver-class-name=org.h2.Driver
# noinspection UnusedProperty
spring.datasource.username=sa
# noinspection UnusedProperty
spring.datasource.password=
# noinspection UnusedProperty
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# noinspection UnusedProperty
spring.jpa.hibernate.ddl-auto=create-drop
# noinspection UnusedProperty
spring.flyway.enabled=false

# Test JWT secret
# noinspection UnusedProperty
JWT_SECRET=test-jwt-secret-for-integration-tests-only-minimum-64-characters-long!

# Suppress noisy SQL in test output
# noinspection UnusedProperty
spring.jpa.show-sql=false
# noinspection UnusedProperty
logging.level.org.hibernate.SQL=WARN
# noinspection UnusedProperty
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
# noinspection UnusedProperty
logging.level.org.springdoc=WARN
