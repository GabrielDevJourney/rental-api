# noinspection UnusedProperty,SpellCheckingInspection
spring.application.name=rentacar-api
# noinspection UnusedProperty
spring.profiles.active=dev
# noinspection UnusedProperty
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Database — override per profile (dev/prod)
# noinspection UnusedProperty
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/vehicle_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
# noinspection UnusedProperty
spring.datasource.username=${DATABASE_USERNAME:root}
# noinspection UnusedProperty
spring.datasource.password=${DATABASE_PASSWORD:}

# Hibernate
# noinspection UnusedProperty
spring.jpa.show-sql=false
# noinspection UnusedProperty
spring.jpa.hibernate.ddl-auto=none
# noinspection UnusedProperty
spring.jpa.properties.hibernate.format_sql=true
# noinspection UnusedProperty
spring.jpa.open-in-view=false

# Logging
# noinspection UnusedProperty
spring.output.ansi.enabled=always

# OpenAPI / Swagger
# noinspection UnusedProperty
springdoc.api-docs.enabled=true
# noinspection UnusedProperty
springdoc.api-docs.path=/api-docs

# JWT — secret MUST be set via JWT_SECRET env var in production
# Default fallback is intentionally weak and signals misconfiguration
# noinspection UnusedProperty
jwt.secret=${JWT_SECRET:dev-only-secret-replace-with-env-var-in-prod-minimum-64-chars!}
# noinspection UnusedProperty
jwt.expiration=86400000

# CORS — override FRONTEND_URL in production
# noinspection UnusedProperty
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}
